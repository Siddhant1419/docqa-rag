spring.application.name=docqa
server.port=8080

# Postgres (auto-started by Docker Compose support)
spring.datasource.url=jdbc:postgresql://localhost:5432/docqa
spring.datasource.username=docqa
spring.datasource.password=docqa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Ollama (runs locally on your Mac, no API key needed)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.embedding.options.model=nomic-embed-text

# pgvector — note: nomic-embed-text uses 768 dimensions, NOT 1536
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# File upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.docqa=INFO